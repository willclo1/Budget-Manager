<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Budget Manager</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
<main class="page">
    <section class="hero">
        <div class="terminal-card">
            <div class="terminal-top">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <div class="terminal-body">
                <p class="prompt">will@budget-manager ~ %</p>
                <h1>Budget Manager</h1>
                <p class="tagline">
                    A polished terminal-based budgeting app for macOS.
                </p>

                <div class="features">
                    <div>Monthly budgets</div>
                    <div>Expense categories</div>
                    <div>Budget history</div>
                    <div>HTML chart reports</div>
                </div>

                <a class="download"
                   href="https://github.com/willclo1/Budget-Manager/releases/latest/download/Budget.Manager.app.zip">
                    Download for macOS
                </a>

                <p class="note">
                    If macOS blocks the app, right-click it and choose <strong>Open</strong>.
                </p>
            </div>
        </div>
    </section>
</main>
</body>
</html>
